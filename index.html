<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1d9e75">
  <title>Grocery Price Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f5; color: #1a1c1b; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: #fff; border-radius: 20px; padding: 40px 28px;
      max-width: 420px; width: 100%; text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .badge {
      width: 64px; height: 64px; border-radius: 50%; background: #1d9e75;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    p { color: #5f635f; font-size: 15px; line-height: 1.6; }
    .status {
      margin-top: 24px; padding: 12px 16px; background: #e1f5ee;
      color: #0f6e56; border-radius: 12px; font-size: 14px; font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
    </div>
    <h1>Grocery Price Tracker</h1>
    <p>Your household grocery intelligence app. We'll build the real features from here, one step at a time.</p>
    <div class="status">Your app is live and working</div>
  </div>
</body>
</html>
